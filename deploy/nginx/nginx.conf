user  nginx;
worker_processes  auto;


error_log  /var/log/nginx/error.log notice;
pid        /run/nginx.pid;




events {
    worker_connections  10240;
}




http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;


    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';


    access_log  /var/log/nginx/access.log  main;
############ safe #############
    proxy_cookie_flags ~ secure;
    server_tokens off;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net;
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.font.im;
    font-src 'self' data: https://fonts.gstatic.com https://fonts.font.im;
    img-src 'self' data: blob:;
    connect-src 'self' https://geojson.cn https://cdn.jsdelivr.net https://fastly.jsdelivr.net https://unpkg.com;
    frame-ancestors 'self';
    base-uri 'self';
    form-action 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
###############################
    sendfile        on;
    #tcp_nopush     on;


    keepalive_timeout  65;


    #gzip  on;


    include /etc/nginx/conf.d/*.conf;
}
